name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so a flurry of pushes doesn't
# pile up against NAV's test endpoint.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

  e2e:
    name: e2e (NAV test env)
    runs-on: ubuntu-latest
    # Secrets are not exposed to PRs from forks — the test helpers call
    # t.Skip when env is missing, so the job passes neutrally on forks.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: E2E
        # Per-submission AcceptTimeout in the harness defaults to 150s;
        # E2E_ACCEPT_TIMEOUT overrides it. NAV's test environment can
        # sit in PROCESSING for minutes during load spikes, so the CI
        # ceiling is generous. 30m wall-time on the go test command
        # gives headroom for the 8-test suite at the worst case
        # without masking a real hang.
        env:
          NAV_BASE_URL: ${{ secrets.NAV_BASE_URL }}
          NAV_LOGIN: ${{ secrets.NAV_LOGIN }}
          NAV_PASSWORD: ${{ secrets.NAV_PASSWORD }}
          NAV_TAX_NUMBER: ${{ secrets.NAV_TAX_NUMBER }}
          NAV_SIGN_KEY: ${{ secrets.NAV_SIGN_KEY }}
          NAV_EXCHANGE_KEY: ${{ secrets.NAV_EXCHANGE_KEY }}
          SUPPLIER_TAX_NUMBER: ${{ secrets.SUPPLIER_TAX_NUMBER }}
          SUPPLIER_NAME: ${{ secrets.SUPPLIER_NAME }}
          SUPPLIER_COUNTRY: ${{ secrets.SUPPLIER_COUNTRY }}
          SUPPLIER_POSTAL_CODE: ${{ secrets.SUPPLIER_POSTAL_CODE }}
          SUPPLIER_CITY: ${{ secrets.SUPPLIER_CITY }}
          SUPPLIER_ADDRESS: ${{ secrets.SUPPLIER_ADDRESS }}
          E2E_ACCEPT_TIMEOUT: 180s
        run: go test -tags=navtest -count=1 -v ./e2e/... -timeout=1800s
